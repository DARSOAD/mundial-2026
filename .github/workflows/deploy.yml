name: Deploy to AWS S3 and CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_IS_LOCAL: "false"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync files to S3 bucket
        run: |
          # Sincronizamos el contenido de out/ hacia la carpeta destino en S3
          aws s3 sync out/ s3://${{ secrets.AWS_S3_BUCKET_NAME }}/mundial-2026/ --delete \
            --exclude "resultados.json" \
            --exclude "predicciones.json" \
            --exclude "predicciones-eliminatorias.json" \
            --exclude "eliminatorias.json" \
            --exclude "settings.json"

      - name: Invalidate CloudFront Cache
        run: |
          # Invalidamos la caché para que los cambios se reflejen de inmediato, actualizamos la id ahora si, estabamos poniendo el nombre
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_DISTRIBUTION_ID }} --paths "/*"
